services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file:
      - apps/server/.env
    environment:
      DATABASE_PATH: /data/app.db
      VIDEOS_DIR: /data/videos
      AUDIO_PRESETS_DIR: /data/audio
      PUBLIC_URL: ${PUBLIC_URL:-http://192.168.1.9:3080}
      SERVER_PORT: 4000
    volumes:
      - ugc-data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '0.0.0.0:3080:3000'
    environment:
      UGC_SERVER_ORIGIN: http://server:4000
    depends_on:
      - server
    restart: unless-stopped

volumes:
  ugc-data:
